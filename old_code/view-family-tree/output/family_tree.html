        <script type="text/javascript">

              // initialize global variables.
              var edges;

              var allEdges;

              var originalNodes;
              var network;

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#97c2fc", "id": "P001", "label": "Nguyen Van An", "shape": "dot", "title": "ID: P001\u003cbr\u003eName: Nguyen Van An\u003cbr\u003eGender: M\u003cbr\u003eBirth: 1958\u003cbr\u003eDeath: None"}, {"color": "#97c2fc", "id": "P002", "label": "Tran Thi Binh", "shape": "dot", "title": "ID: P002\u003cbr\u003eName: Tran Thi Binh\u003cbr\u003eGender: F\u003cbr\u003eBirth: 1962\u003cbr\u003eDeath: None"}, {"color": "#97c2fc", "id": "P003", "label": "Nguyen Van Cuong", "shape": "dot", "title": "ID: P003\u003cbr\u003eName: Nguyen Van Cuong\u003cbr\u003eGender: M\u003cbr\u003eBirth: 1985\u003cbr\u003eDeath: None"}, {"color": "#97c2fc", "id": "P004", "label": "Le Thi Dung", "shape": "dot", "title": "ID: P004\u003cbr\u003eName: Le Thi Dung\u003cbr\u003eGender: F\u003cbr\u003eBirth: 1987\u003cbr\u003eDeath: None"}, {"color": "#97c2fc", "id": "P005", "label": "Nguyen Minh Em", "shape": "dot", "title": "ID: P005\u003cbr\u003eName: Nguyen Minh Em\u003cbr\u003eGender: F\u003cbr\u003eBirth: 2012\u003cbr\u003eDeath: None"}]);
                  edges = new vis.DataSet([{"arrows": "to", "from": "P001", "label": "parent_of", "title": "type=parent_of, confidence=1.0", "to": "P003"}, {"arrows": "to", "from": "P001", "label": "spouse_of", "title": "type=spouse_of, confidence=1.0", "to": "P002"}, {"arrows": "to", "from": "P002", "label": "parent_of", "title": "type=parent_of, confidence=1.0", "to": "P003"}, {"arrows": "to", "from": "P002", "label": "spouse_of", "title": "type=spouse_of, confidence=1.0", "to": "P001"}, {"arrows": "to", "from": "P003", "label": "parent_of", "title": "type=parent_of, confidence=1.0", "to": "P005"}, {"arrows": "to", "from": "P003", "label": "spouse_of", "title": "type=spouse_of, confidence=1.0", "to": "P004"}, {"arrows": "to", "from": "P004", "label": "parent_of", "title": "type=parent_of, confidence=1.0", "to": "P005"}, {"arrows": "to", "from": "P004", "label": "spouse_of", "title": "type=spouse_of, confidence=1.0", "to": "P003"}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {

    },
    "edges": {
        "color": {

        },
        "smooth": {

    },
    "interaction": {

        "hideEdgesOnDrag": false,

    },
    "physics": {
        "barnesHut": {
            "avoidOverlap": 0,
            "centralGravity": 0.3,
            "damping": 0.09,
            "gravitationalConstant": -80000,
            "springConstant": 0.001,
            "springLength": 250
        },
        "enabled": true,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
