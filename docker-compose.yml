version: "3.9"

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: family-tree-nginx
    ports:
      - "88:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./family-saga-io
      dockerfile: Dockerfile
    container_name: family-tree-frontend
    ports:
      - "5174:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./nlp_family_extractor
      dockerfile: Dockerfile
    container_name: family-tree-backend
    ports:
      - "8002:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: family_tree
      MYSQL_USER: family_user
      MYSQL_PASSWORD: family_password
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: family-tree-mysql
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: family_tree
      MYSQL_USER: family_user
      MYSQL_PASSWORD: family_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mysql_data:
